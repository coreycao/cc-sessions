name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - label: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend tests
        timeout-minutes: 10
        run: pnpm test:frontend

      - name: Rust tests
        timeout-minutes: 15
        run: pnpm test:rust

      - name: Load release notes
        id: release-notes
        shell: bash
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          NOTES_FILE="docs/releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            {
              echo "body<<EOF"
              cat "$NOTES_FILE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "Release notes were not found at ${NOTES_FILE}."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and upload app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: CC Sessions ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload updater signatures
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          while IFS= read -r -d '' sig; do
            gh release upload "$TAG_NAME" "$sig" --repo "$GITHUB_REPOSITORY" --clobber
          done < <(find src-tauri/target -path '*/release/bundle/*' -name '*.sig' -print0)
