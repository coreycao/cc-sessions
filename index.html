<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC Sessions</title>
    <script>
      const t = localStorage.getItem('theme') || 'system';
      const d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme:dark)').matches);
      if (d) document.documentElement.classList.add('dark');
      document.documentElement.style.background = d ? '#0a0a0a' : '#fafafa';
    </script>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      html { background: #fafafa; }
      html.dark { background: #0a0a0a; }
      #boot-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        color: #888;
      }
      #boot-loader .spinner {
        width: 28px; height: 28px; border: 2px solid currentColor; border-top-color: transparent;
        border-radius: 50%; animation: boot-spin 0.8s linear infinite;
      }
      #boot-loader .label { font-size: 13px; }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader">
        <div class="spinner"></div>
        <div class="label">Scanning sessions...</div>
      </div>
    </div>
    <script type="module" src="./src/renderer/main.tsx"></script>
  </body>
</html>
